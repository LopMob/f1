{% extends "base.html" %}
{% block title %}Home - F1 Motion Lab{% endblock %}

{% block content %}
<section class="hero">
    <div class="hero-overlay"></div>
    <div class="hero-content">
        <h1 class="hero-title">FORMULA 1 EXPERIENCE</h1>
        <p class="hero-subtitle" data-i18n="hero_subtitle"></p>
        <div class="hero-btns">
            <a class="primary-btn" href="{{ url_for('tracks') }}" data-i18n="btn_explore_tracks"></a>
            <a class="secondary-btn" href="{{ url_for('standings') }}" data-i18n="btn_standings"></a>
        </div>
    </div>
</section>

<section class="stats-bar">
    <div class="container stats-bar-inner">
        <div class="qstat"><span class="qstat-val">22</span><span class="qstat-label" data-i18n="stat_races"></span></div>
        <div class="qstat-div"></div>
        <div class="qstat"><span class="qstat-val">575</span><span class="qstat-label" data-i18n="stat_pts"></span></div>
        <div class="qstat-div"></div>
        <div class="qstat"><span class="qstat-val">20</span><span class="qstat-label" data-i18n="stat_drivers"></span></div>
        <div class="qstat-div"></div>
        <div class="qstat"><span class="qstat-val">10</span><span class="qstat-label" data-i18n="stat_teams"></span></div>
        <div class="qstat-div"></div>
        <div class="qstat"><span class="qstat-val">1:11.8</span><span class="qstat-label" data-i18n="stat_lap"></span></div>
    </div>
</section>

<section class="section features">
    <div class="container">
        <h2 data-i18n="section_explore"></h2>
        <div class="card-grid">
            <a href="{{ url_for('tracks') }}" class="info-card info-card-link">
                <div class="info-card-icon">🏁</div>
                <h3 data-i18n="card_tracks_title"></h3>
                <p data-i18n="card_tracks_desc"></p>
            </a>
            <a href="{{ url_for('drivers') }}" class="info-card info-card-link">
                <div class="info-card-icon">🧑‍✈️</div>
                <h3 data-i18n="card_drivers_title"></h3>
                <p data-i18n="card_drivers_desc"></p>
            </a>
            <a href="{{ url_for('standings') }}" class="info-card info-card-link">
                <div class="info-card-icon">🏆</div>
                <h3 data-i18n="card_standings_title"></h3>
                <p data-i18n="card_standings_desc"></p>
            </a>
            <a href="{{ url_for('races') }}" class="info-card info-card-link">
                <div class="info-card-icon">📅</div>
                <h3 data-i18n="card_races_title"></h3>
                <p data-i18n="card_races_desc"></p>
            </a>
            <a href="{{ url_for('compare') }}" class="info-card info-card-link">
                <div class="info-card-icon">⚡</div>
                <h3 data-i18n="card_compare_title"></h3>
                <p data-i18n="card_compare_desc"></p>
            </a>
        </div>
    </div>
</section>

<section class="section cta-section">
    <div class="container center">
        <a class="primary-btn" href="{{ url_for('tracks') }}" data-i18n="btn_start"></a>
    </div>
</section>
{% endblock %}
