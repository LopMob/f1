{% extends "base.html" %}
{% block title %}Compare Drivers - F1 Motion Lab{% endblock %}

{% block content %}
<section class="page-header">
    <div class="container">
        <h1 data-i18n="compare_title"></h1>
        <p data-i18n="compare_subtitle"></p>
    </div>
</section>

<section class="section">
    <div class="container">
        <div class="compare-selectors">
            <select id="selA" onchange="updateCompare()">
                {% for d in drivers %}<option value="{{ loop.index0 }}" {% if loop.index0 == 0 %}selected{% endif %}>{{ d.name }}</option>{% endfor %}
            </select>
            <span class="vs-badge">VS</span>
            <select id="selB" onchange="updateCompare()">
                {% for d in drivers %}<option value="{{ loop.index0 }}" {% if loop.index0 == 2 %}selected{% endif %}>{{ d.name }}</option>{% endfor %}
            </select>
        </div>
        <div class="compare-grid" id="compare-output"></div>
    </div>
</section>

<script>
const drivers = {{ drivers | tojson }};

const STATS = [
    { key: 'points',       en: 'Points',         ru: 'Очки'           },
    { key: 'wins',         en: 'Wins',           ru: 'Победы'         },
    { key: 'podiums',      en: 'Podiums',        ru: 'Подиумы'        },
    { key: 'poles',        en: 'Pole Positions', ru: 'Поул-позиции'   },
    { key: 'fastest_laps', en: 'Fastest Laps',   ru: 'Быстрых кругов' },
];

function updateCompare() {
    const a   = drivers[+document.getElementById('selA').value];
    const b   = drivers[+document.getElementById('selB').value];
    const out = document.getElementById('compare-output');
    const lang = localStorage.getItem('f1_lang') || 'en';

    let html = `
        <div class="compare-header">
            <div class="compare-driver" style="border-color:${a.color}">
                <div class="cmp-flag">${a.flag}</div>
                <div class="cmp-name">${a.name}</div>
                <div class="cmp-team" style="color:${a.color}">${a.team}</div>
                <div class="cmp-num">#${a.number}</div>
            </div>
            <div class="compare-driver" style="border-color:${b.color}">
                <div class="cmp-flag">${b.flag}</div>
                <div class="cmp-name">${b.name}</div>
                <div class="cmp-team" style="color:${b.color}">${b.team}</div>
                <div class="cmp-num">#${b.number}</div>
            </div>
        </div>
        <div class="compare-bars">`;

    STATS.forEach(s => {
        const va = a[s.key] || 0, vb = b[s.key] || 0;
        const total = va + vb || 1;
        const pctA = Math.round(va / total * 100);
        const label = s[lang] || s.en;
        html += `
            <div class="cmp-row">
                <span class="cmp-val ${va > vb ? 'cmp-winner' : ''}">${va}</span>
                <div class="cmp-bar-group">
                    <div class="cmp-bar-label">${label}</div>
                    <div class="cmp-bar-track">
                        <div class="cmp-bar-a" style="width:${pctA}%;background:${a.color}"></div>
                        <div class="cmp-bar-b" style="width:${100-pctA}%;background:${b.color}"></div>
                    </div>
                </div>
                <span class="cmp-val ${vb > va ? 'cmp-winner' : ''}">${vb}</span>
            </div>`;
    });

    html += `</div>
        <div class="compare-bio-grid">
            <div class="compare-bio-card" style="border-top:3px solid ${a.color}"><p>${lang === 'ru' && a.bio_ru ? a.bio_ru : a.bio}</p></div>
            <div class="compare-bio-card" style="border-top:3px solid ${b.color}"><p>${lang === 'ru' && b.bio_ru ? b.bio_ru : b.bio}</p></div>
        </div>`;

    out.innerHTML = html;
}

updateCompare();
document.addEventListener('langchange', updateCompare);
</script>
{% endblock %}
