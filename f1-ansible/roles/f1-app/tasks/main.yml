---
- name: Install system dependencies
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - git
      - python3
      - python3-pip
    state: present
    update_cache: true

- name: Add Docker GPG key
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Add Docker repository
  apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present

- name: Install Docker CE
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
    state: present

- name: Start and enable Docker
  systemd:
    name: docker
    state: started
    enabled: true

- name: Add user to docker group
  user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true

- name: Clone repository
  git:
    repo: "{{ app_repo }}"
    dest: "{{ app_dir }}"
    version: main
    force: true

- name: Build Docker image
  community.docker.docker_image:
    name: f1-motion-lab
    tag: latest
    build:
      path: "{{ app_dir }}"
    source: build

- name: Remove existing container
  community.docker.docker_container:
    name: f1-motion-lab
    state: absent
  ignore_errors: true

- name: Run container
  community.docker.docker_container:
    name: f1-motion-lab
    image: f1-motion-lab:latest
    state: started
    restart_policy: always
    ports:
      - "{{ app_port }}:5001"

- name: Check app is running
  uri:
    url: "http://localhost:{{ app_port }}"
    status_code: 200
  retries: 5
  delay: 5
